<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 Приватный P2P Мессенджер</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
    <h1>🔒 Приватный P2P Мессенджер (без серверов)</h1>
    <p id="status">Статус: готов к соединению</p>

    <div class="id-block">
        <strong>Мой ID:</strong> <span id="myId">Загрузка...</span>
        <button onclick="copyMyId()">📋 Копировать ID</button>
    </div>

    <div class="connect-block">
        <input id="friendId" placeholder="Вставь ID друга сюда" style="width: 280px;">
        <button onclick="connectToFriend()">🔗 Подключиться</button>
    </div>

    <div class="videos">
        <div>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <video id="remoteVideo" autoplay playsinline></video>
            <button onclick="toggleFullscreen()" class="fullscreen-btn">⛶ На полный экран</button>
        </div>
    </div>

    <button onclick="startCamera()">📹 Камера + микрофон (звонок)</button>
    <button onclick="shareScreen()">🖥️ Экран + звук компьютера (стример)</button>

    <div class="chat">
        <strong>Чат:</strong>
        <input id="chatInput" placeholder="Напиши и нажми Enter" onkeypress="if(event.key==='Enter') sendMessage()">
        <pre id="chatOutput">Чат появится здесь...</pre>
    </div>

    <script src="script.js"></script>
</body>
</html>
